      - generic [ref=e34]:
        - heading "Network Attached Storage (NAS), explained in 100 seconds." [level=1] [ref=e35]
        - img "What is network attached storage?" [ref=e36]
        - paragraph [ref=e37]: I am a paranoid data-hoarder.
        - paragraph [ref=e38]: There, I said it.
        - paragraph [ref=e39]:
          - text: I hear stories of people’s
          - strong [ref=e40]: entire iCloud photo library being accidentally deleted,
          - text: and I shiver.
        - paragraph [ref=e41]: Also, the idea of ”running out of storage space” gives me anxiety.
        - paragraph [ref=e42]: At one point, I was paying for…
        - list [ref=e43]:
          - listitem [ref=e44]: Google Drive storage AND
          - listitem [ref=e45]: Dropbox AND
          - listitem [ref=e46]: iCloud AND
          - listitem [ref=e47]: buying new external hard drives each year AND
          - listitem [ref=e48]: Netflix AND Spotify AND HBO Max AND Prime AND Audible
        - paragraph [ref=e49]: I pay for none of those now.
        - paragraph [ref=e50]: Actually we still pay for Netflix because my wife won’t let me cancel. Dadgum Call The Midwife.
        - paragraph [ref=e51]:
          - text: "ENTER:"
          - strong [ref=e52]:
            - emphasis [ref=e53]: The NAS.
        - heading "What’s a NAS?" [level=2] [ref=e54]
        - paragraph [ref=e55]: Stands for ”Network Attached Storage.”
        - paragraph [ref=e56]:
          - text: But it’s easier to explain
          - emphasis [ref=e57]: backwards.
        - list [ref=e58]:
          - listitem [ref=e59]: STORAGE = hard drives
          - listitem [ref=e60]: ATTACHED = plugged into…
          - listitem [ref=e61]: NETWORK = …your wifi router
        - heading "Right cool beans Pete…but what IS the actual device?" [level=2] [ref=e62]
        - paragraph [ref=e63]: A server (a.k.a. ”computer”).
        - paragraph [ref=e64]: When you hear ”SeRvEr”, just think ”computer.”
        - paragraph [ref=e65]:
          - emphasis [ref=e66]: Let the fancy-pants IT Professionals flame me for that description, but there ya go.
        - paragraph [ref=e67]:
          - img "My NAS" [ref=e68]
        - paragraph [ref=e69]: Mine hangs out next to my router in my basement. A tiny bit bigger than a toaster.
        - paragraph [ref=e70]: I forget it’s there—until I need it.
        - heading "Boorrriiiing. Who cares?" [level=2] [ref=e71]
        - paragraph [ref=e72]: A NAS can do LOTS of cool things, actually.
        - heading "My own personal cloud storage" [level=3] [ref=e73]
        - paragraph [ref=e74]: I moved my stuff OFF of iCloud, Dropbox, and Google Drive 👉 onto my NAS.
        - paragraph [ref=e75]: I can access it from anywhere in the world.
        - paragraph [ref=e76]:
          - img "NAS file finder screenshot" [ref=e77]
        - heading "My own media streaming platform" [level=3] [ref=e78]
        - list [ref=e79]:
          - listitem [ref=e80]: All my photos
          - listitem [ref=e81]: All my movies & TV shows 🏴‍☠️
          - listitem [ref=e82]: All my music
        - paragraph [ref=e83]: Stored on the NAS.
        - paragraph [ref=e84]: I use free, open-source software to ”consume” that stuff.
        - list [ref=e85]:
          - listitem [ref=e86]: Photos = Immich (and it’s AMAZING)
          - listitem [ref=e87]: Movies/TV = Plex
          - listitem [ref=e88]: Music = Plexamp
        - paragraph [ref=e89]:
          - text: Perhaps we’ll talk about
          - emphasis [ref=e90]: how
          - text: I get that media in another email? 🏴‍☠️
        - heading "Running software 24/7" [level=3] [ref=e91]
        - paragraph [ref=e92]: I could…
        - list [ref=e93]:
          - listitem [ref=e94]: host my WordPress sites from my ”server.”
          - listitem [ref=e95]: install AI LLMs on it.
          - listitem [ref=e96]: put Openclaw on it to have those LLMs operate on their own—24 hours a day.
          - listitem [ref=e97]: automate backups and other stuff to happen overnight.
        - heading "Ok ”paranoid Pete”, all of your data on a hard drive in your basement? Sounds risky." [level=2] [ref=e98]
        - paragraph [ref=e99]:
          - text: Not as long as I stick to the ”
          - emphasis [ref=e100]: 3-2-1 Backup Method!
          - text: ”
        - list [ref=e101]:
          - listitem [ref=e102]: THREE copies of your data
          - listitem [ref=e103]: on TWO different devices
          - listitem [ref=e104]: with at least ONE of them stored off-site.
        - paragraph [ref=e105]: "Here’s my setup:"
        - list [ref=e106]:
          - listitem [ref=e107]: My NAS has an 8TB hard drive. It stores stuff.
          - listitem [ref=e108]: My NAS has another 8TB ”parity” hard drive, sitting right next to the other one.
          - listitem [ref=e109]: A USB external hard drive, sitting at my mother-n-law’s house.
        - paragraph [ref=e110]: If a HDD fails, the ”parity” is a backup.
        - paragraph [ref=e111]: If my basement floods, my (backed-up quarterly) external hard drive is the backup.
        - paragraph [ref=e112]: If my town is nuked and I lose both, I have bigger problems to worry about.
        - heading "3 ways to have your own NAS" [level=2] [ref=e113]
        - heading "Buy a pre-made one (easiest)" [level=3] [ref=e114]
        - paragraph [ref=e115]: Synology is the go-to. Plug it in, install their app, you’re basically done. More expensive, but simple.
        - paragraph [ref=e116]:
          - text: "NOTE: Some"
          - strong [ref=e117]:
            - text: pre-mades come with the
            - link "actual hard drives" [ref=e118] [cursor=pointer]:
              - /url: https://amzn.to/4siucr9
            - text: ", but many do NOT."
        - list [ref=e119]:
          - listitem [ref=e120]:
            - link "2-HDD Synology pre-made" [ref=e121] [cursor=pointer]:
              - /url: http://amzn.to/4bw3yDS
            - text: = $275
          - listitem [ref=e122]:
            - link "5-HDD Synology pre-made" [ref=e123] [cursor=pointer]:
              - /url: http://amzn.to/47SbaQ3
            - text: (”top-of-the-line” specs) = $2,000
        - paragraph [ref=e124]:
          - text: There are PLENTY around the $200-400 price range!
          - strong [ref=e125]: (If you just cut ONE Dropbox subscription, that’ll pay for itself in no time 💸).
        - heading "Build your own (most fun, what Pete did)" [level=3] [ref=e126]
        - paragraph [ref=e127]: Order parts, watch YouTube, put it together like adult Legos. It WILL take time and patience—but you’ll spend WAY less money than a similarly-featured pre-made.
        - paragraph [ref=e128]:
          - text: Mine cost roughly $450, including the hard drives,
          - strong [ref=e129]: and it has roughly the same specs as the $2,000 Synology.
        - paragraph [ref=e130]: "#humblebrag"
        - heading "Recycle an old computer (cheapest)" [level=3] [ref=e131]
        - paragraph [ref=e132]: Old desktop in the storage unit (or Goodwill)??
        - paragraph [ref=e133]: Install Unraid or TrueNAS on it and BOOM. You have a NAS. Great way to dip your toes in before spending a lot.
