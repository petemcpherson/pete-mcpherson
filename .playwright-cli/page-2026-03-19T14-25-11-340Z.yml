        - heading "NAS software" [level=3] [ref=e157]
        - paragraph [ref=e158]: Pre-made NAS boxes come with their own software.
        - paragraph [ref=e159]:
          - text: Build your own or recycle an old PC? You’ll need to install an OS. I went with
          - link "Unraid" [ref=e160] [cursor=pointer]:
            - /url: https://unraid.net/pricing?via=9a88fc
          - text: ($49 lifetime) because it seemed the most ”i’ve never done this before”-friendly. Worth every penny.
        - paragraph [ref=e161]:
          - img [ref=e162]
        - heading "Power consumption" [level=3] [ref=e163]
        - paragraph [ref=e164]: Most NAS units are specifically engineered to use as little power as possible.
        - paragraph [ref=e165]: Each hard drive (once spun up) might use between 6-12 watts, and the rest of the NAS a bit more.
        - paragraph [ref=e166]: My hard drives are spinning 24/7, and I estimate roughly $4/month in electric.
        - paragraph [ref=e167]: An old computer might be a bit higher if it’s running 24/7.
        - heading "I want to do this. What are the next steps?" [level=2] [ref=e168]
        - heading "PRE-MADE 👇" [level=3] [ref=e169]
        - paragraph [ref=e170]: Do shopping research! I recommend sticking with Synology, but I’ve also heard of…
        - list [ref=e171]:
          - listitem [ref=e172]: Terramaster
          - listitem [ref=e173]: QNAP
          - listitem [ref=e174]: Ugreen
        - paragraph [ref=e175]:
          - text: The
          - strong [ref=e176]: SOFTWARE is what you care about with pre-mades, and Synology and Terramaster are more ”proven.”
        - heading "BUILD YOUR OWN 👇" [level=3] [ref=e177]
        - list [ref=e178]:
          - listitem [ref=e179]:
            - text: Read through
            - link "one of Brian Moses build breakdowns" [ref=e180] [cursor=pointer]:
              - /url: https://blog.briancmoses.com/2024/11/diy-nas-2025-edition.html
            - text: "! These are great for ”what do I need to order.” He publishes a new one every year. I followed the ”2024 econo-nas” build."
          - listitem [ref=e181]: Order parts (I used Aliexpress for most of my stuff cuz’ it’s cheaper)
          - listitem [ref=e182]: Head to YouTube for how to put it all together
        - paragraph [ref=e183]:
          - text: It took me maybe 8 hours spread out over a few weeks.
          - strong [ref=e184]: If you don’t enjoy this process, don’t go the DIY route.
        - paragraph [ref=e185]: You WILL have to Google/YouTube/Claude.ai each little roadblock that comes up!
